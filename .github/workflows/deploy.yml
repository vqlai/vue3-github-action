name: Deploy Vue3 with PNPM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 强制使用 Node.js 24，消除 Node 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 安装 PNPM（修复 pnpm 报错）
      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false  # 关键：关闭自动安装，避免 packages 字段错误

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24  # 使用 Node 24，无警告
          cache: 'pnpm'

      # 正确安装依赖
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4