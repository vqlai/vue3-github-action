name: Deploy Vue3 with PNPM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 👇 关键：安装 PNPM
      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # 👇 安装 Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'  # 缓存加速

      # 👇 PNPM 安装依赖
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 👇 PNPM 构建
      - name: Build
        run: pnpm build

      # 上传 dist
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4